<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Local Loop Bengaluru</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root{font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#27231e;background:#f1e8d7}*{box-sizing:border-box}body{margin:0;overflow:hidden}button,select{font:inherit}.app{display:grid;grid-template-columns:270px 1fr;min-height:100vh;background:#f1e8d7}.sidebar{z-index:20;display:flex;flex-direction:column;gap:18px;padding:26px 14px;border-right:1px solid rgba(73,61,45,.14);background:linear-gradient(180deg,#f5eddc 0%,#eee1c7 100%);box-shadow:10px 0 35px rgba(54,42,26,.08)}.brand{padding:0 8px 18px;border-bottom:1px solid rgba(58,49,35,.12)}.eyebrow{margin:0 0 8px;color:#8a7458;font-size:11px;font-weight:800;letter-spacing:.25em;text-transform:uppercase}.brand h1{margin:0;font-family:Georgia,serif;font-size:32px;line-height:1}.brand p:not(.eyebrow){margin:8px 0 0;color:#796b59;font-family:Georgia,serif;font-size:13px;font-style:italic}.card{padding:10px;border:1px solid rgba(68,55,37,.1);border-radius:18px;background:rgba(255,251,241,.58)}.card h2{margin:0 0 10px;font-size:18px}.list{display:grid;gap:7px}.place{padding:10px;border:1px solid transparent;border-radius:12px;background:rgba(255,255,255,.45);cursor:pointer;text-align:left}.place:hover,.place.active{border-color:#3d3324;background:#fffaf0}.place b,.place span{display:block}.place span{margin-top:4px;color:#827462;font-size:12px}.filters{position:absolute;z-index:500;top:24px;left:24px;right:24px;display:flex;flex-wrap:wrap;gap:9px;pointer-events:none}.pill{pointer-events:auto;padding:10px 14px;border:1px solid rgba(83,70,52,.16);border-radius:999px;background:rgba(250,244,232,.9);color:#4b4135;cursor:pointer;box-shadow:0 6px 20px rgba(65,55,39,.08);backdrop-filter:blur(12px)}.pill.active{background:#24211d;color:#fff6e7}.mapwrap{position:relative;min-width:0}.map{height:100vh;width:100%;background:#efe6d3;filter:sepia(.18) saturate(.74) brightness(1.02)}.count{position:absolute;z-index:500;left:26px;bottom:28px;padding:11px 15px;border-radius:999px;background:rgba(255,248,235,.92);color:#6e604d;font-size:13px;box-shadow:0 10px 24px rgba(44,34,22,.12)}.drawer{position:absolute;z-index:600;top:92px;right:24px;width:min(380px,calc(100% - 48px));padding:22px;border:1px solid rgba(80,65,45,.14);border-radius:26px;background:rgba(255,250,240,.95);box-shadow:0 26px 70px rgba(53,39,20,.2);backdrop-filter:blur(18px)}.drawer h2{margin:0;font-family:Georgia,serif;font-size:30px}.drawer p{color:#6f614f;line-height:1.5}.tags{display:flex;flex-wrap:wrap;gap:8px;margin:16px 0}.tags span{padding:7px 9px;border-radius:999px;background:#efe4d0;color:#4f4435;font-size:12px}dl{display:grid;gap:10px;margin:0}dl div{display:grid;grid-template-columns:92px 1fr;gap:10px;padding-top:10px;border-top:1px solid rgba(54,44,32,.1)}dt{color:#86745b;font-size:12px;font-weight:800;text-transform:uppercase}dd{margin:0;color:#372f26;font-size:14px}.history{margin-top:12px;padding:13px;border-radius:14px;background:#27231e;color:#f7ecd8}.history h3{margin:0 0 8px;font-size:15px}.history p{margin:0;color:#dccfb8;font-size:13px}.loop-marker{display:grid;place-items:center;border:2px solid rgba(52,45,35,.72);border-radius:50%;background:rgba(255,250,239,.9);box-shadow:0 4px 12px rgba(47,38,26,.24)}.loop-marker span{width:8px;height:8px;border-radius:50%;background:#383027}.leaflet-popup-content-wrapper{border-radius:16px;background:#fffaf0;color:#312a22}@media(max-width:820px){body{overflow:auto}.app{grid-template-columns:1fr}.sidebar{min-height:auto}.map{height:72vh}.filters{top:14px;left:14px;right:14px;max-height:146px;overflow:auto}.drawer{position:relative;top:auto;right:auto;width:auto;margin:14px}}
  </style>
</head>
<body>
  <main class="app">
    <aside class="sidebar">
      <div class="brand"><p class="eyebrow">Local Loop</p><h1>Bengaluru</h1><p>An atlas of local gems, institutions, cafés, bakeries, and street food.</p></div>
      <section class="card"><h2>Discover</h2><div id="places" class="list"></div></section>
      <section class="card"><h2>Neighborhood note</h2><div id="history" class="history"></div></section>
    </aside>
    <section class="mapwrap">
      <div id="filters" class="filters"></div>
      <div id="map" class="map"></div>
      <div id="count" class="count"></div>
      <article id="drawer" class="drawer"></article>
    </section>
  </main>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const places=[{id:'mtr',name:'MTR',neighborhood:'Lalbagh',lat:12.9551,lng:77.5857,tags:['Institutions','Vegetarian','Budget Eats'],price:'₹₹',veg:'excellent',ambiance:'Heritage dining room',best:'Classic rava idli, filter coffee, and a breakfast institution near Lalbagh.',hours:'6:30 AM – 9:30 PM'},{id:'ctr',name:'CTR',neighborhood:'Malleshwaram',lat:13.0056,lng:77.5696,tags:['Institutions','Vegetarian','Budget Eats'],price:'₹',veg:'excellent',ambiance:'Fast-moving darshini energy',best:'Benne masala dosa and old Bengaluru breakfast queues.',hours:'7 AM – 12:30 PM, 4 PM – 9 PM'},{id:'vidyarthi',name:'Vidyarthi Bhavan',neighborhood:'Basavanagudi',lat:12.945,lng:77.5714,tags:['Institutions','Vegetarian','Budget Eats'],price:'₹',veg:'excellent',ambiance:'Crowded, nostalgic, communal',best:'Crisp dosas, shared tables, and Gandhi Bazaar history.',hours:'6:30 AM – 11:30 AM, 2 PM – 8 PM'},{id:'third-wave',name:'Third Wave Coffee',neighborhood:'Indiranagar',lat:12.9784,lng:77.6408,tags:['Cafes','Local Gems'],price:'₹₹₹',veg:'good',ambiance:'Laptop-friendly café',best:'A reliable work session around 12th Main and 100 Feet Road.',hours:'8 AM – 11 PM'},{id:'thoms',name:"Thom's Bakery",neighborhood:'Frazer Town',lat:12.9977,lng:77.6158,tags:['Bakeries','Local Gems'],price:'₹₹',veg:'mixed',ambiance:'Neighborhood bakery bustle',best:'Plum cake, puffs, and Cantonment-era bakery culture.',hours:'8 AM – 9:30 PM'},{id:'hari',name:'Hari Super Sandwich',neighborhood:'Jayanagar',lat:12.9308,lng:77.5838,tags:['Street Food','Budget Eats','Vegetarian'],price:'₹',veg:'excellent',ambiance:'Street-side quick bite',best:'Chilli cheese toast and Jayanagar snack runs.',hours:'11 AM – 10 PM'},{id:'blossom',name:'Blossom & Coffee Walk',neighborhood:'Church Street',lat:12.9757,lng:77.6045,tags:['Cafes','Local Gems'],price:'₹₹',veg:'good',ambiance:'Walkable book-and-café lane',best:'A slow loop through books, coffee, and people watching.',hours:'10 AM – 10 PM'},{id:'truffles',name:'Truffles',neighborhood:'Koramangala',lat:12.9352,lng:77.6245,tags:['Late Night','Budget Eats','Local Gems'],price:'₹₹',veg:'good',ambiance:'Busy student and startup crowd',best:'Comfort food after meetings, movies, or late classes.',hours:'11 AM – 11:30 PM'},{id:'lavonne',name:'Lavonne',neighborhood:'Lavelle Road',lat:12.9717,lng:77.5992,tags:['Bakeries','Cafes'],price:'₹₹₹',veg:'good',ambiance:'Polished patisserie café',best:'Pastries, coffee, and leafy CBD breaks.',hours:'9 AM – 10 PM'}];
    const histories={Basavanagudi:['Temple Town Grid','Basavanagudi grew around the Bull Temple and old market streets, with darshinis, flower sellers, and cultural sabhas still shaping its food rhythm.'],Malleshwaram:['Markets and Morning Tiffin','Malleshwaram blends planned avenues, old homes, music schools, and breakfast counters that fill up before office hours.'],Indiranagar:['From Quiet Layout to Café Spine','Indiranagar shifted from residential calm to one of Bengaluru’s most active food and nightlife corridors.'],FrazerTown:['Bakery Belt Stories','Frazer Town’s bakeries, meat shops, and festive food traditions reflect Cantonment-era neighborhood culture.'],Jayanagar:['South Bengaluru Everyday Eats','Jayanagar’s planned blocks hide chat counters, darshinis, and family-run spots locals revisit for decades.'],ChurchStreet:['Books, Coffee, and Walkability','Church Street connects bookstores, pubs, cafés, and performance spaces into a compact food trail.'],Koramangala:['Startup Cafés and Brunch Trails','Koramangala follows student housing, startup offices, and late brunch culture.'],LavelleRoad:['Garden-City Dining Pockets','Lavelle Road preserves leafy courtyards, polished cafés, and legacy addresses close to Cubbon Park.'],Lalbagh:['Garden Edge Institutions','The Lalbagh edge anchors some of the city’s oldest breakfast institutions and market-side routines.']};
    const tagOptions=['Local Gems','Institutions','Budget Eats','Cafes','Bakeries','Late Night','Vegetarian','Street Food'];const tagEmoji={'Local Gems':'💎',Institutions:'🏛️','Budget Eats':'💰',Cafes:'☕',Bakeries:'🥐','Late Night':'🌙',Vegetarian:'🌿','Street Food':'🥣'};let selectedTags=[],selected=places[0];
    const map=L.map('map',{zoomControl:false}).setView([12.9716,77.5946],12);L.control.zoom({position:'bottomright'}).addTo(map);L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap'}).addTo(map);const icon=L.divIcon({className:'loop-marker',html:'<span></span>',iconSize:[28,28],iconAnchor:[14,14]});let markers=[];
    function filtered(){return places.filter(p=>!selectedTags.length||selectedTags.every(t=>p.tags.includes(t)))}function key(n){return n.replace(/\s/g,'')}function render(){const visible=filtered();document.getElementById('count').textContent=`${visible.length} local stops showing`;document.getElementById('filters').innerHTML=tagOptions.map(t=>`<button class="pill ${selectedTags.includes(t)?'active':''}" data-tag="${t}">${tagEmoji[t]} ${t}</button>`).join('')+`<button class="pill" data-clear="1">Clear</button>`;document.getElementById('places').innerHTML=visible.map(p=>`<button class="place ${p.id===selected.id?'active':''}" data-id="${p.id}"><b>${p.name}</b><span>${p.neighborhood} · ${p.price} · ${p.tags[0]}</span></button>`).join('');markers.forEach(m=>m.remove());markers=visible.map(p=>L.marker([p.lat,p.lng],{icon}).addTo(map).bindPopup(`<b>${p.name}</b><br>${p.neighborhood}`).on('click',()=>select(p)));drawSelected();document.querySelectorAll('[data-tag]').forEach(b=>b.onclick=()=>{const t=b.dataset.tag;selectedTags=selectedTags.includes(t)?selectedTags.filter(x=>x!==t):[...selectedTags,t];render()});document.querySelector('[data-clear]').onclick=()=>{selectedTags=[];render()};document.querySelectorAll('[data-id]').forEach(b=>b.onclick=()=>select(places.find(p=>p.id===b.dataset.id)))}
    function drawSelected(){document.getElementById('drawer').innerHTML=`<h2>${selected.name}</h2><p>${selected.best}</p><div class="tags">${selected.tags.map(t=>`<span>${tagEmoji[t]} ${t}</span>`).join('')}</div><dl><div><dt>Area</dt><dd>${selected.neighborhood}</dd></div><div><dt>Hours</dt><dd>${selected.hours}</dd></div><div><dt>Ambiance</dt><dd>${selected.ambiance}</dd></div><div><dt>Veg</dt><dd>${selected.veg}</dd></div></dl>`;const h=histories[key(selected.neighborhood)]||histories.Lalbagh;document.getElementById('history').innerHTML=`<h3>${h[0]}</h3><p>${h[1]}</p>`}function select(p){selected=p;map.flyTo([p.lat,p.lng],14,{duration:.7});render()}render();
  </script>
</body>
</html>
