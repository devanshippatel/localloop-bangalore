mary": "Malleshwaram was planned in the late 19th century and still feels like a breakfast neighborhood: temple bells, flower sellers, tiffin rooms, and loyal queues that form before office hours."}, {"neighborhood": "Basavanagudi", "title": "Temple streets and tiffin rooms", "summary": "Basavanagudi grew around the Bull Temple and Gandhi Bazaar. Its food culture is built on vegetarian institutions, market walks, and places where recipes feel older than the street signs."}, {"neighborhood": "Jayanagar", "title": "Blocks, parks, and snack counters", "summary": "Jayanagar's planned blocks hide some of south Bengaluru's most everyday food rituals: sandwich counters, darshinis, family lunch rooms, and chaat stops woven into shopping streets."}, {"neighborhood": "Frazer Town", "title": "Cantonment bakery loop", "summary": "Frazer Town reflects Bengaluru's Cantonment side, with bakeries, meat shops, and holiday food traditions that make the area feel like a pantry for half the city."}, {"neighborhood": "Lavelle Road", "title": "Garden-city dining pockets", "summary": "Lavelle Road sits close to Cubbon Park and the old central business district. Its food places often feel leafy, polished, and slightly hidden behind compound walls or courtyard entries."}, {"neighborhood": "Church Street", "title": "Books, coffee, and footpaths", "summary": "Church Street is one of the city's most walkable food loops: bookstores, coffee counters, pubs, and dessert stops connected by a street that rewards wandering."}, {"neighborhood": "Koramangala", "title": "Brunch, startups, and late plates", "summary": "Koramangala's dining scene grew with students, startups, and apartment clusters. Breakfast cafés, casual diners, and late-night restaurants sit a few turns from each other."}];const tagOptions=['Local Gems','Institutions','Budget Eats','Cafes','Bakeries','Late Night','Vegetarian','Street Food'];const tagEmoji={'Local Gems':'💎',Institutions:'🏛️','Budget Eats':'💰',Cafes:'☕',Bakeries:'🥐','Late Night':'🌙',Vegetarian:'🌿','Street Food':'🥣'};let selectedTags=[],selectedPlace=null,cowork=false,veg=false;const map=L.map('map',{zoomControl:false}).setView([12.978,77.615],12);L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap'}).addTo(map);L.marker([12.9716,77.5946],{icon:L.divIcon({className:'ll-user-dot',iconSize:[16,16],iconAnchor:[8,8]})}).addTo(map);let markers=[];function icon(active){return L.divIcon({className:active?'ll-marker is-active':'ll-marker',html:'<span></span>',iconSize:[24,24],iconAnchor:[12,12]})}function filtered(){return places.filter(p=>(!selectedTags.length||selectedTags.every(t=>p.tags.includes(t)))&&(!cowork||p.goodForCoworking)&&(!veg||p.vegOptions==='good'||p.vegOptions==='excellent'||p.tags.includes('Vegetarian')))}function render(){const visible=filtered();document.getElementById('count').textContent=visible.length+' places on map';document.getElementById('chips').innerHTML='<button class="filter-chip" data-clear="1">🆕 New</button>'+tagOptions.map(t=>`<button class="filter-chip ${selectedTags.includes(t)?'active':''}" data-tag="${t}"><span>${tagEmoji[t]}</span> ${t}</button>`).join('');markers.forEach(m=>m.remove());markers=visible.map(p=>L.marker([p.lat,p.lng],{icon:icon(selectedPlace?.id===p.id)}).addTo(map).bindPopup(`<strong>${p.name}</strong><br>${p.neighborhood}`).on('click',()=>selectPlace(p)));document.querySelectorAll('[data-tag]').forEach(b=>b.onclick=()=>{const t=b.dataset.tag;selectedTags=selectedTags.includes(t)?selectedTags.filter(x=>x!==t):[...selectedTags,t];render()});document.querySelector('[data-clear]').onclick=()=>{selectedTags=[];cowork=false;veg=false;document.getElementById('cowork').checked=false;document.getElementById('veg').checked=false;render()};drawSheet()}function selectPlace(p){selectedPlace=p;map.flyTo([p.lat,p.lng],14,{duration:.7});render()}function drawSheet(){const el=document.getElementById('sheet');if(!selectedPlace){el.className='place-sheet';el.innerHTML='';return}const p=selectedPlace;el.className='place-sheet open';el.innerHTML=`<button class="sheet-close" onclick="selectedPlace=null;render()">×</button><div class="sheet-kicker">${p.neighborhood} · ${p.tags[0]}</div><h2>${p.name}</h2><p class="sheet-story">${p.bestFor}</p><div class="sheet-tags">${p.tags.map(t=>`<span>${t}</span>`).join('')}</div><dl><div><dt>Price</dt><dd>${p.price}</dd></div><div><dt>Ambiance</dt><dd>${p.ambiance}</dd></div><div><dt>Hours</dt><dd>${p.hours}</dd></div><div><dt>Veg</dt><dd>${p.vegOptions}</dd></div></dl>`}const neighborhoods=[...new Set(places.map(p=>p.neighborhood))].sort();const select=document.getElementById('neighborhood');select.innerHTML=neighborhoods.map(n=>`<option>${n}</option>`).join('');select.value='Indiranagar';function drawLore(){const item=histories.find(h=>h.neighborhood===select.value)||histories[0];document.getElementById('loreTitle').textContent=item.title;document.getElementById('loreText').textContent=item.summary}select.onchange=drawLore;drawLore();document.getElementById('cowork').onchange=e=>{cowork=e.target.checked;render()};document.getElementById('veg').onchange=e=>{veg=e.target.checked;render()};document.getElementById('mapTab').onclick=()=>{document.getElementById('mapTab').className='active';document.getElementById('discoverTab').className='';document.getElementById('discover').className='discover-panel'};document.getElementById('discoverTab').onclick=()=>{document.getElementById('discoverTab').className='active';document.getElementById('mapTab').className='';document.getElementById('discover').className='discover-panel open'};render();
